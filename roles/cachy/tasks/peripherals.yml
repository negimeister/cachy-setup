---
- name: Copy keyboard layout
  ansible.builtin.copy:
    src: jp
    dest: /usr/share/X11/xkb/symbols/jpdv
    owner: root
    mode: "644"
  become: true

- name: Register jpdv layout in evdev.xml
  ansible.builtin.blockinfile:
    path: /usr/share/X11/xkb/rules/evdev.xml
    insertbefore: "</layoutList>"
    marker: "<!-- {mark} ANSIBLE MANAGED BLOCK: jpdv layout -->"
    block: |2
        <layout>
          <configItem>
            <name>jpdv</name>
            <shortDescription>jpdv</shortDescription>
            <description>JPDV (custom layout)</description>
            <languageList>
              <iso639Id>eng</iso639Id>
            </languageList>
          </configItem>
          <variantList>
            <variant>
              <configItem>
                <name>dvorak</name>
                <description>JPDV (Dvorak)</description>
              </configItem>
            </variant>
          </variantList>
        </layout>
  become: true

- name: Copy KDE keeb config
  ansible.builtin.copy:
    src: kxkbrc
    dest: "{{ ansible_user_dir }}/.config/"

- name: Copy udev rules
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /etc/udev/rules.d/
    owner: root
    mode: "644"
  become: true
  with_items:
    - 50-sofle.rules
    - 60-hidraw.rules
    - 69-probe-rs.rules
